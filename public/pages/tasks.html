<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Tasks — ARCUS</title>
  <link rel="stylesheet" href="../css/dashboard.css"/>
</head>
<body>
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">A</div>
      <span class="logo-text">Arcu<span>s</span></span>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Main</div>
      <a href="dashboard.html" class="sidebar-link"><span class="link-icon">🏠</span> Overview</a>
      <a href="projects.html"  class="sidebar-link"><span class="link-icon">📁</span> Projects <span class="link-badge">6</span></a>
      <a href="board.html"     class="sidebar-link"><span class="link-icon">🗂</span> Board</a>
      <a href="tasks.html"     class="sidebar-link active"><span class="link-icon">✅</span> My Tasks <span class="link-badge amber">4</span></a>
      <a href="team.html"      class="sidebar-link"><span class="link-icon">👥</span> Team</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Analytics</div>
      <a href="#" class="sidebar-link"><span class="link-icon">📊</span> Reports</a>
      <a href="#" class="sidebar-link"><span class="link-icon">⏱</span> Time Tracking</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Settings</div>
      <a href="settings.html" class="sidebar-link"><span class="link-icon">⚙️</span> Settings</a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="window.location='settings.html'">
        <div class="avatar av-blue">JD</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">Jane Doe</div>
          <div class="sidebar-user-role">Admin</div>
        </div>
        <div class="status-dot online"></div>
      </div>
    </div>
  </aside>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-breadcrumb">
      <span>Arcus</span><span class="bc-sep">/</span>
      <span class="bc-current">My Tasks</span>
    </div>
    <div class="topbar-search">
      <span class="topbar-search-icon">🔍</span>
      <input class="input" type="search" placeholder="Search tasks…" id="task-search"/>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-ghost btn-icon" data-tip="Notifications">🔔 <span class="notif-dot"></span></button>
      <button class="btn btn-primary btn-sm" onclick="openModal('new-task-modal')">+ New Task</button>
      <div class="avatar av-blue">JD</div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main-content">

    <!-- Page Header -->
    <div class="page-header">
      <div class="page-header-left">
        <div class="page-title">My Tasks</div>
        <div class="page-sub">Track and manage all your assigned work</div>
      </div>
      <div class="page-header-right">
        <button class="btn btn-ghost btn-sm" id="sort-btn" onclick="cycleSort()">⇅ Sort: <span id="sort-label">Due Date</span></button>
        <button class="btn btn-ghost btn-sm" id="group-btn" onclick="cycleGroup()">⊞ Group: <span id="group-label">Status</span></button>
      </div>
    </div>

    <!-- Quick Stats -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem" id="task-stats-row">
      <div class="card flex gap-3 items-center" style="padding:1rem 1.2rem">
        <div style="width:38px;height:38px;border-radius:var(--r);background:rgba(90,100,144,.15);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0">📋</div>
        <div><div class="stat-value" id="st-all"  style="font-size:1.5rem;font-family:'Syne',sans-serif;font-weight:800">—</div><div class="stat-label" style="font-size:.75rem;color:var(--text-3)">Total</div></div>
      </div>
      <div class="card flex gap-3 items-center" style="padding:1rem 1.2rem">
        <div style="width:38px;height:38px;border-radius:var(--r);background:rgba(99,120,255,.12);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0">🔵</div>
        <div><div class="stat-value" id="st-inprogress" style="font-size:1.5rem;font-family:'Syne',sans-serif;font-weight:800">—</div><div class="stat-label" style="font-size:.75rem;color:var(--text-3)">In Progress</div></div>
      </div>
      <div class="card flex gap-3 items-center" style="padding:1rem 1.2rem">
        <div style="width:38px;height:38px;border-radius:var(--r);background:rgba(245,158,11,.12);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0">⚠️</div>
        <div><div class="stat-value" id="st-overdue" style="font-size:1.5rem;font-family:'Syne',sans-serif;font-weight:800;color:#fb7185">—</div><div class="stat-label" style="font-size:.75rem;color:var(--text-3)">Overdue</div></div>
      </div>
      <div class="card flex gap-3 items-center" style="padding:1rem 1.2rem">
        <div style="width:38px;height:38px;border-radius:var(--r);background:rgba(16,185,129,.12);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0">✅</div>
        <div><div class="stat-value" id="st-done" style="font-size:1.5rem;font-family:'Syne',sans-serif;font-weight:800;color:#34d399">—</div><div class="stat-label" style="font-size:.75rem;color:var(--text-3)">Completed</div></div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="card" style="padding:.75rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
      <span style="font-size:.78rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em">Filter:</span>
      <div style="display:flex;gap:.4rem;flex-wrap:wrap" id="filter-btns">
        <button class="filter-btn btn btn-sm" data-filter="all"        style="background:var(--blue);color:#fff;border-color:var(--blue)">All</button>
        <button class="filter-btn btn btn-ghost btn-sm" data-filter="todo">To Do</button>
        <button class="filter-btn btn btn-ghost btn-sm" data-filter="inprogress">In Progress</button>
        <button class="filter-btn btn btn-ghost btn-sm" data-filter="review">Review</button>
        <button class="filter-btn btn btn-ghost btn-sm" data-filter="done">Done</button>
      </div>
      <div style="width:1px;height:20px;background:var(--border);margin:0 .25rem"></div>
      <div style="display:flex;gap:.4rem;flex-wrap:wrap">
        <button class="priority-btn btn btn-ghost btn-sm" data-priority="urgent">🔴 Urgent</button>
        <button class="priority-btn btn btn-ghost btn-sm" data-priority="high">🟠 High</button>
        <button class="priority-btn btn btn-ghost btn-sm" data-priority="medium">🟡 Medium</button>
        <button class="priority-btn btn btn-ghost btn-sm" data-priority="low">🟢 Low</button>
      </div>
      <button class="btn btn-ghost btn-sm" id="clear-filters-btn" onclick="clearFilters()" style="margin-left:auto;display:none">✕ Clear</button>
    </div>

    <!-- Task Groups -->
    <div id="task-groups"></div>

  </main>
</div>

<!-- NEW TASK MODAL -->
<div class="modal-overlay" id="new-task-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="task-modal-title">New Task</div>
      <button class="modal-close" onclick="closeModal('new-task-modal')">✕</button>
    </div>
    <form id="task-form">
      <div style="display:flex;flex-direction:column;gap:1rem">
        <div class="input-group">
          <label class="input-label">Task Title *</label>
          <input class="input" type="text" id="t-title" placeholder="What needs to be done?" required/>
        </div>
        <div class="input-group">
          <label class="input-label">Description</label>
          <textarea class="input" id="t-desc" rows="3" placeholder="Add more details…"></textarea>
        </div>
        <div class="grid-2">
          <div class="input-group">
            <label class="input-label">Project</label>
            <select class="input" id="t-project">
              <option value="">No project</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">Status</label>
            <select class="input" id="t-status">
              <option value="todo">To Do</option>
              <option value="inprogress">In Progress</option>
              <option value="review">Review</option>
              <option value="done">Done</option>
            </select>
          </div>
        </div>
        <div class="grid-2">
          <div class="input-group">
            <label class="input-label">Priority</label>
            <select class="input" id="t-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">Due Date</label>
            <input class="input" type="date" id="t-due"/>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:.75rem;margin-top:.25rem">
          <button type="button" class="btn btn-ghost" onclick="closeModal('new-task-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="save-task-btn">Create Task</button>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- TASK DETAIL MODAL -->
<div class="modal-overlay" id="task-detail-modal">
  <div class="modal" style="max-width:580px">
    <div class="modal-header">
      <div class="modal-title">Task Detail</div>
      <button class="modal-close" onclick="closeModal('task-detail-modal')">✕</button>
    </div>
    <div id="task-detail-body"></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/utils.js"></script>
<script src="../js/tasks.js"></script>
</body>
</html>
