<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Team — ARCUS</title>
  <link rel="stylesheet" href="../css/dashboard.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-mark">A</div><span class="logo-text">Arcu<span>s</span></span></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Main</div>
      <a href="dashboard.html" class="sidebar-link"><span class="link-icon">🏠</span> Overview</a>
      <a href="projects.html" class="sidebar-link"><span class="link-icon">📁</span> Projects</a>
      <a href="board.html" class="sidebar-link"><span class="link-icon">🗂</span> Board</a>
      <a href="tasks.html" class="sidebar-link"><span class="link-icon">✅</span> My Tasks</a>
      <a href="team.html" class="sidebar-link active"><span class="link-icon">👥</span> Team</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Settings</div>
      <a href="settings.html" class="sidebar-link"><span class="link-icon">⚙️</span> Settings</a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar av-blue">JD</div>
        <div class="sidebar-user-info"><div class="sidebar-user-name">Jane Doe</div><div class="sidebar-user-role">Admin</div></div>
        <div class="status-dot online"></div>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-breadcrumb"><span>Arcus</span><span class="bc-sep">/</span><span class="bc-current">Team</span></div>
    <div class="topbar-search">
      <span class="topbar-search-icon">🔍</span>
      <input class="input" type="search" placeholder="Search members…" id="member-search"/>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-ghost btn-icon">🔔</button>
      <button class="btn btn-primary btn-sm" onclick="openInviteModal()">+ Invite Member</button>
      <div class="avatar av-blue">JD</div>
    </div>
  </header>

  <main class="main-content">
    <div class="page-header">
      <div class="page-header-left">
        <div class="page-title">Team</div>
        <div class="page-sub">Manage your workspace members and roles</div>
      </div>
      <div class="page-header-right">
        <select class="input" id="role-filter" style="width:auto;height:36px;font-size:.83rem">
          <option value="">All Roles</option>
          <option value="admin">Admin</option>
          <option value="manager">Manager</option>
          <option value="developer">Developer</option>
          <option value="designer">Designer</option>
        </select>
      </div>
    </div>

    <!-- Stats row -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem" id="team-stats">
      <div class="card flex gap-3 items-center">
        <div class="stat-icon blue">👥</div>
        <div><div class="stat-value" id="st-total" style="font-size:1.5rem">—</div><div class="stat-label">Total Members</div></div>
      </div>
      <div class="card flex gap-3 items-center">
        <div class="stat-icon emerald">🟢</div>
        <div><div class="stat-value" id="st-online" style="font-size:1.5rem">—</div><div class="stat-label">Online Now</div></div>
      </div>
      <div class="card flex gap-3 items-center">
        <div class="stat-icon amber">📬</div>
        <div><div class="stat-value" id="st-pending" style="font-size:1.5rem">—</div><div class="stat-label">Pending Invites</div></div>
      </div>
    </div>

    <!-- Members Grid -->
    <div class="grid-3" id="members-grid" style="gap:1rem"></div>
  </main>
</div>

<!-- Invite Modal -->
<div class="modal-overlay" id="invite-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Invite Team Member</div>
      <button class="modal-close" onclick="closeModal('invite-modal')">✕</button>
    </div>
    <form id="invite-form">
      <div style="display:flex;flex-direction:column;gap:1rem">
        <div class="input-group">
          <label class="input-label">Email Address *</label>
          <input class="input" type="email" id="invite-email" placeholder="colleague@company.com" required/>
        </div>
        <div class="input-group">
          <label class="input-label">Role</label>
          <select class="input" id="invite-role">
            <option value="developer">Developer</option>
            <option value="designer">Designer</option>
            <option value="manager">Manager</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="input-group">
          <label class="input-label">Personal Message (optional)</label>
          <textarea class="input" id="invite-msg" rows="2" placeholder="Looking forward to working with you!"></textarea>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:.75rem">
          <button type="button" class="btn btn-ghost" onclick="closeModal('invite-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Send Invite ✉</button>
        </div>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/utils.js"></script>
<script src="../js/team.js"></script>
</body>
</html>
