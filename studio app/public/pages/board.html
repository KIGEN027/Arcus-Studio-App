<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Board — ARCUS</title>
  <link rel="stylesheet" href="../css/dashboard.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="logo-mark">A</div><span class="logo-text">Arcu<span>s</span></span></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Main</div>
      <a href="dashboard.html" class="sidebar-link"><span class="link-icon">🏠</span> Overview</a>
      <a href="projects.html" class="sidebar-link"><span class="link-icon">📁</span> Projects</a>
      <a href="board.html" class="sidebar-link active"><span class="link-icon">🗂</span> Board</a>
      <a href="tasks.html" class="sidebar-link"><span class="link-icon">✅</span> My Tasks <span class="link-badge amber">4</span></a>
      <a href="team.html" class="sidebar-link"><span class="link-icon">👥</span> Team</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Settings</div>
      <a href="settings.html" class="sidebar-link"><span class="link-icon">⚙️</span> Settings</a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar av-blue">JD</div>
        <div class="sidebar-user-info"><div class="sidebar-user-name">Jane Doe</div><div class="sidebar-user-role">Admin</div></div>
        <div class="status-dot online"></div>
      </div>
    </div>
  </aside>

  <header class="topbar">
    <div class="topbar-breadcrumb">
      <span>Arcus</span><span class="bc-sep">/</span><span class="bc-current">Kanban Board</span>
    </div>
    <div class="topbar-search">
      <span class="topbar-search-icon">🔍</span>
      <input class="input" type="search" placeholder="Filter cards…" id="board-search"/>
    </div>
    <div class="topbar-actions">
      <select class="input" id="board-project-filter" style="width:auto;height:36px;font-size:.83rem">
        <option value="">All Projects</option>
      </select>
      <button class="btn btn-ghost btn-icon" data-tip="Notifications">🔔</button>
      <button class="btn btn-primary btn-sm" onclick="openCardModal()">+ Add Card</button>
      <div class="avatar av-blue">JD</div>
    </div>
  </header>

  <main class="main-content" style="overflow:hidden;display:flex;flex-direction:column">
    <div class="page-header" style="margin-bottom:1rem">
      <div class="page-header-left">
        <div class="page-title">Kanban Board</div>
        <div class="page-sub">Drag cards to update status</div>
      </div>
      <div class="page-header-right">
        <div style="display:flex;align-items:center;gap:.4rem">
          <div class="avatar av-blue avatar-sm" data-tip="Jane Doe"></div>
          <div class="avatar av-violet avatar-sm" data-tip="Alex Kim"></div>
          <div class="avatar av-emerald avatar-sm" data-tip="Sam Chen"></div>
          <div class="avatar av-amber avatar-sm" data-tip="Maria G."></div>
          <button class="btn btn-ghost btn-sm" style="border-radius:50%;width:28px;height:28px;padding:0">+</button>
        </div>
      </div>
    </div>

    <div class="kanban-board" id="kanban-board">
      <!-- Columns injected by JS -->
    </div>
  </main>
</div>

<!-- Card Detail Modal -->
<div class="modal-overlay" id="card-modal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <div class="modal-title" id="card-modal-title">Add Card</div>
      <button class="modal-close" onclick="closeModal('card-modal')">✕</button>
    </div>
    <form id="card-form">
      <div style="display:flex;flex-direction:column;gap:1rem">
        <div class="input-group">
          <label class="input-label">Title *</label>
          <input class="input" type="text" id="card-title" placeholder="Task name…" required/>
        </div>
        <div class="grid-2">
          <div class="input-group">
            <label class="input-label">Status</label>
            <select class="input" id="card-status">
              <option value="todo">To Do</option>
              <option value="inprogress">In Progress</option>
              <option value="review">Review</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">Priority</label>
            <select class="input" id="card-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">Description</label>
          <textarea class="input" id="card-desc" rows="3" placeholder="Add details…"></textarea>
        </div>
        <div class="grid-2">
          <div class="input-group">
            <label class="input-label">Assignee</label>
            <select class="input" id="card-assignee">
              <option value="">Unassigned</option>
              <option value="jane">Jane Doe</option>
              <option value="alex">Alex Kim</option>
              <option value="sam">Sam Chen</option>
              <option value="maria">Maria Garcia</option>
            </select>
          </div>
          <div class="input-group">
            <label class="input-label">Due Date</label>
            <input class="input" type="date" id="card-due"/>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:.75rem">
          <button type="button" class="btn btn-ghost" onclick="closeModal('card-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Card</button>
        </div>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/utils.js"></script>
<script src="../js/board.js"></script>
</body>
</html>
